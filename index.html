<!DOCTYPE html>
<html>
<head>

<title>p5 Creative Playground</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

</head>

<body>

<h1>Creative Coding Playground</h1>

<select id="exampleSelect" onchange="loadExample()">
<option value="">Examples</option>
<option value="circle">Circle Follow</option>
<option value="bounce">Bouncing Ball</option>
<option value="art">Generative Art</option>
</select>

<textarea id="code"></textarea>

<div class="buttons">

<button onclick="runCode()">Run</button>

<button onclick="saveSketch()">Save</button>

<button onclick="loadSketch()">Load</button>

<button onclick="exportImage()">Export PNG</button>

<button onclick="fullscreenCanvas()">Fullscreen</button>

</div>

<div id="error"></div>

<div id="canvas-container"></div>

<script src="examples.js"></script>
<script src="storage.js"></script>
<script src="script.js"></script>

</body>
</html>
